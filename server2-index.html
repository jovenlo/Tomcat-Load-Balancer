<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Server 2 — JBoss WildFly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Courier New', monospace;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2e40;
      border-top: 4px solid #3b82f6;
      border-radius: 8px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .badge {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .server-name {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .server-role {
      font-size: 15px;
      color: #3b82f6;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .info-grid {
      display: grid;
      gap: 12px;
      text-align: left;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #0f1117;
      border-radius: 4px;
      border: 1px solid #2a2e40;
    }

    .info-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-value {
      font-size: 13px;
      color: #e5e7eb;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Active</div>
    <div class="server-name">Linux Server 2</div>
    <div class="server-role">JBoss WildFly</div>
    <div class="info-grid">
      <div class="info-row">
        <span class="info-label">Status</span>
        <span class="info-value"><span class="status-dot"></span>Running</span>
      </div>
      <div class="info-row">
        <span class="info-label">Stack</span>
        <span class="info-value">JBoss WildFly + Java 21</span>
      </div>
      <div class="info-row">
        <span class="info-label">Port</span>
        <span class="info-value">9090 (HTTP)</span>
      </div>
      <div class="info-row">
        <span class="info-label">OS</span>
        <span class="info-value">RHEL (EC2)</span>
      </div>
    </div>
  </div>
</body>
</html>
