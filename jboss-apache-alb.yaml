AWSTemplateFormatVersion: '2010-09-09'
Description: >
  JBoss (WildFly) + Apache HTTPD + AWS ALB Deployment
  - 2 EC2 instances (LinuxServer1, LinuxServer2)
  - Java 21 + WildFly 33 (JBoss) installed via UserData
  - Apache HTTPD as reverse proxy (port 80 -> 8080)
  - Application Load Balancer with Target Group

# ─────────────────────────────────────────────
# PARAMETERS
# ─────────────────────────────────────────────
Parameters:

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 Key Pair for SSH access

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where resources will be created

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two public subnets in different AZs (for ALB)

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI (auto-resolved via SSM)

# ─────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────
Resources:

  # ── Security Group: EC2 Instances ──────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB and SSH from anywhere
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: HTTP from ALB only
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
      Tags:
        - Key: Name
          Value: JBossEC2-SG

  # ── Security Group: ALB ────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from internet to ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Public HTTP
      Tags:
        - Key: Name
          Value: JBossALB-SG

  # ── IAM Role for EC2 (SSM access) ──────────
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: JBossEC2Role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # ── UserData script (shared by both servers) ─
  # Installs: Java 21, WildFly 33 (JBoss), Apache HTTPD reverse proxy
  # SELinux boolean set for httpd -> network connect

  # ── EC2: LinuxServer1 ───────────────────────
  LinuxServer1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: LinuxServer1
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          exec > /var/log/userdata.log 2>&1

          # ── Step 1: Set hostname ──────────────
          hostnamectl set-hostname LinuxServer1

          # ── Step 2: Update system ─────────────
          yum update -y

          # ── Step 3: Install Java 21 ───────────
          yum install -y java-21-amazon-corretto
          java -version

          # ── Step 4: Install WildFly 33 (JBoss) ──
          cd /opt
          wget -q https://github.com/wildfly/wildfly/releases/download/33.0.0.Final/wildfly-33.0.0.Final.tar.gz
          tar -xzf wildfly-33.0.0.Final.tar.gz
          mv wildfly-33.0.0.Final jboss

          # ── Step 5: Create WildFly system user ──
          groupadd -r wildfly
          useradd -r -g wildfly -d /opt/jboss -s /sbin/nologin wildfly
          chown -R wildfly:wildfly /opt/jboss

          # ── Step 6: Configure WildFly as a service ──
          mkdir -p /etc/wildfly
          cp /opt/jboss/docs/contrib/scripts/systemd/wildfly.conf /etc/wildfly/
          cp /opt/jboss/docs/contrib/scripts/systemd/launch.sh /opt/jboss/bin/
          chmod +x /opt/jboss/bin/launch.sh
          cp /opt/jboss/docs/contrib/scripts/systemd/wildfly.service /etc/systemd/system/

          # ── Step 7: Start WildFly (JBoss) ──────
          systemctl daemon-reload
          systemctl start wildfly
          systemctl enable wildfly

          # Wait for WildFly to be ready
          sleep 20
          curl -sf localhost:8080 || echo "WildFly not yet ready, continuing..."

          # ── Step 8: Install Apache HTTPD ──────
          yum install -y httpd

          # ── Step 9: Configure Reverse Proxy ───
          cat >> /etc/httpd/conf/httpd.conf <<'EOF'

          # JBoss (WildFly) Reverse Proxy
          ProxyPreserveHost On
          ProxyPass / http://localhost:8080/
          ProxyPassReverse / http://localhost:8080/
          EOF

          # ── Step 10: SELinux Permission ────────
          setsebool -P httpd_can_network_connect 1

          # ── Step 11: Start Apache ──────────────
          apachectl configtest
          systemctl start httpd
          systemctl enable httpd
          systemctl status httpd

  # ── EC2: LinuxServer2 ───────────────────────
  LinuxServer2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: LinuxServer2
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          exec > /var/log/userdata.log 2>&1

          # ── Step 1: Set hostname ──────────────
          hostnamectl set-hostname LinuxServer2

          # ── Step 2: Update system ─────────────
          yum update -y

          # ── Step 3: Install Java 21 ───────────
          yum install -y java-21-amazon-corretto
          java -version

          # ── Step 4: Install WildFly 33 (JBoss) ──
          cd /opt
          wget -q https://github.com/wildfly/wildfly/releases/download/33.0.0.Final/wildfly-33.0.0.Final.tar.gz
          tar -xzf wildfly-33.0.0.Final.tar.gz
          mv wildfly-33.0.0.Final jboss

          # ── Step 5: Create WildFly system user ──
          groupadd -r wildfly
          useradd -r -g wildfly -d /opt/jboss -s /sbin/nologin wildfly
          chown -R wildfly:wildfly /opt/jboss

          # ── Step 6: Configure WildFly as a service ──
          mkdir -p /etc/wildfly
          cp /opt/jboss/docs/contrib/scripts/systemd/wildfly.conf /etc/wildfly/
          cp /opt/jboss/docs/contrib/scripts/systemd/launch.sh /opt/jboss/bin/
          chmod +x /opt/jboss/bin/launch.sh
          cp /opt/jboss/docs/contrib/scripts/systemd/wildfly.service /etc/systemd/system/

          # ── Step 7: Start WildFly (JBoss) ──────
          systemctl daemon-reload
          systemctl start wildfly
          systemctl enable wildfly

          # Wait for WildFly to be ready
          sleep 20
          curl -sf localhost:8080 || echo "WildFly not yet ready, continuing..."

          # ── Step 8: Install Apache HTTPD ──────
          yum install -y httpd

          # ── Step 9: Configure Reverse Proxy ───
          cat >> /etc/httpd/conf/httpd.conf <<'EOF'

          # JBoss (WildFly) Reverse Proxy
          ProxyPreserveHost On
          ProxyPass / http://localhost:8080/
          ProxyPassReverse / http://localhost:8080/
          EOF

          # ── Step 10: SELinux Permission ────────
          setsebool -P httpd_can_network_connect 1

          # ── Step 11: Start Apache ──────────────
          apachectl configtest
          systemctl start httpd
          systemctl enable httpd
          systemctl status httpd

  # ── Target Group ────────────────────────────
  LoadTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: Load-Target-Group
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Targets:
        - Id: !Ref LinuxServer1
          Port: 80
        - Id: !Ref LinuxServer2
          Port: 80
      Tags:
        - Key: Name
          Value: Load-Target-Group

  # ── Application Load Balancer ───────────────
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: JBoss-Apache-ALB
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: JBoss-Apache-ALB

  # ── ALB Listener (HTTP:80) ──────────────────
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref LoadTargetGroup

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
Outputs:

  ALBDNSName:
    Description: Access your JBoss app via this URL
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"
    Export:
      Name: !Sub "${AWS::StackName}-ALB-DNS"

  LinuxServer1Id:
    Description: Instance ID of LinuxServer1
    Value: !Ref LinuxServer1

  LinuxServer2Id:
    Description: Instance ID of LinuxServer2
    Value: !Ref LinuxServer2

  TargetGroupArn:
    Description: ARN of the Target Group
    Value: !Ref LoadTargetGroup
